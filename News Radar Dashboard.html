<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<title>News Radar Dashboard — Design</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="lib/tokens.css"/>

<style>
  body { overflow: hidden; }
  .nr-inline { display: inline; vertical-align: middle; margin-right: 2px; }

  /* design canvas host */
  #root { height: 100vh; }

  /* page title strip above each artboard */
  .dc-label { font-family: var(--f-sans); }

  /* --- Full-bleed prototype variant --- */
  body[data-mode="proto"] #root { display: block; height: 100vh; }
  body[data-mode="proto"] .nr-app { width: 100vw; height: 100vh; border-radius: 0; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel (pinned w/ integrity per design guidelines) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- mock data (plain JS) -->
<script src="lib/mock-data.js"></script>

<!-- shared components -->
<script type="text/babel" src="lib/shell.jsx"></script>
<script type="text/babel" src="lib/pages-1.jsx"></script>
<script type="text/babel" src="lib/pages-2.jsx"></script>
<script type="text/babel" src="lib/detail.jsx"></script>

<!-- design_canvas starter -->
<script type="text/babel" src="lib/design-canvas.jsx"></script>

<!-- App + composition -->
<script type="text/babel">
const { useState, useEffect } = React;

/*EDITMODE-BEGIN*/
const TWEAK_DEFAULTS = {
  "mode": "canvas",
  "theme": "light",
  "default_page": "home",
  "accent": "violet"
};
/*EDITMODE-END*/

const persisted = (() => { try { return JSON.parse(localStorage.getItem("nr_tweaks") || "{}"); } catch { return {}; } })();
const cfg = { ...TWEAK_DEFAULTS, ...persisted };

// ---------- Dashboard App (one mounted instance) ----------
function DashApp({ initialPage = "home", theme = "light" }) {
  const [page, setPage] = useState(initialPage);
  const [detail, setDetail] = useState(null);

  const counts = {
    queued:  window.MOCK_ITEMS.filter(i => i.queue_status === "queued").length,
    dropped: window.MOCK_ITEMS.filter(i => i.status === "dropped").length,
  };

  const meta = {
    home:     { title: "首頁",       sub: "過去 24 小時的 News Radar 呼吸節奏" },
    queue:    { title: "佇列",       sub: `目前排入 · ${counts.queued} 篇待發 · 最近 72 小時全部稿件` },
    archive:  { title: "歷史已發布", sub: "封面 + 分數 + 三平台互動一眼看完" },
    dropped:  { title: "被擋掉的新聞", sub: "scorer 認為不值得發的——看看你自己會不會不同意" },
    persona:  { title: "語氣 Persona", sub: "News Radar Soul v4.1 · 三平台差異化寫手規則" },
    settings: { title: "設定顯示",   sub: "門檻、主題權重、reflector 執行紀錄 · 純顯示" },
  }[page];

  return (
    <div className="nr-app" data-theme={theme} style={{ position: "relative" }}>
      <Sidebar currentPage={page} setPage={setPage} counts={counts}/>
      <div style={{ display: "flex", flexDirection: "column", minWidth: 0, overflow: "auto" }}>
        <Topbar title={meta.title} subtitle={meta.sub} theme={theme} setTheme={() => {}}/>
        <div style={{ flex: 1, minHeight: 0 }}>
          {page === "home"     && <HomePage    openDetail={setDetail}/>}
          {page === "queue"    && <QueuePage   openDetail={setDetail}/>}
          {page === "archive"  && <ArchivePage openDetail={setDetail}/>}
          {page === "dropped"  && <DroppedPage/>}
          {page === "persona"  && <PersonaPage/>}
          {page === "settings" && <SettingsPage/>}
        </div>
      </div>
      {detail && <DetailOverlay itemId={detail} onClose={() => setDetail(null)}/>}
    </div>
  );
}

// ---------- Canvas layout: 5 pages + detail example ----------
function Canvas() {
  // DCArtboard is from design-canvas starter; cards each host a DashApp frozen on one page
  const sections = [
    {
      id: "overview", title: "Home + Queue — the two pages Alex opens first",
      boards: [
        { id: "home",    label: "Home · 過去 24 小時",   width: 1400, height: 900, page: "home"    },
        { id: "queue",   label: "Queue · 佇列排程",       width: 1400, height: 900, page: "queue"   },
      ],
    },
    {
      id: "archive", title: "Archive & Dropped — the review loop",
      boards: [
        { id: "archive", label: "Archive · 歷史已發布",  width: 1400, height: 900, page: "archive" },
        { id: "dropped", label: "Dropped · 被擋掉",      width: 1400, height: 900, page: "dropped" },
      ],
    },
    {
      id: "system", title: "Persona & Settings — 看系統的腦",
      boards: [
        { id: "persona",  label: "Persona · 語氣規則",  width: 1400, height: 900, page: "persona"  },
        { id: "settings", label: "Settings · 門檻與權重", width: 1400, height: 900, page: "settings" },
      ],
    },
    {
      id: "detail", title: "Detail overlay — slide-in drawer from any row",
      boards: [
        { id: "detail", label: "Detail · 貼文預覽分頁", width: 1400, height: 900, page: "home", openDetail: "d_p01" },
      ],
    },
  ];

  return (
    <DesignCanvas initialScale={0.5}>
      {sections.map(sec => (
        <DCSection key={sec.id} id={sec.id} title={sec.title}>
          {sec.boards.map(b => (
            <DCArtboard key={b.id} id={b.id} label={b.label} width={b.width} height={b.height}>
              <DashAppFrozen page={b.page} openDetail={b.openDetail}/>
            </DCArtboard>
          ))}
        </DCSection>
      ))}
    </DesignCanvas>
  );
}

// A frozen variant that can auto-open the detail overlay for one artboard
function DashAppFrozen({ page, openDetail }) {
  const [detail, setDetail] = useState(openDetail || null);
  const [cur, setCur] = useState(page);
  const counts = {
    queued:  window.MOCK_ITEMS.filter(i => i.queue_status === "queued").length,
    dropped: window.MOCK_ITEMS.filter(i => i.status === "dropped").length,
  };
  const meta = {
    home:     { title: "首頁",       sub: "過去 24 小時的 News Radar 呼吸節奏" },
    queue:    { title: "佇列",       sub: `目前排入 · ${counts.queued} 篇待發 · 最近 72 小時全部稿件` },
    archive:  { title: "歷史已發布", sub: "封面 + 分數 + 三平台互動一眼看完" },
    dropped:  { title: "被擋掉的新聞", sub: "scorer 認為不值得發的——看看你自己會不會不同意" },
    persona:  { title: "語氣 Persona", sub: "News Radar Soul v4.1 · 三平台差異化寫手規則" },
    settings: { title: "設定顯示",   sub: "門檻、主題權重、reflector 執行紀錄 · 純顯示" },
  }[cur];
  return (
    <div className="nr-app" style={{ position: "relative" }}>
      <Sidebar currentPage={cur} setPage={setCur} counts={counts}/>
      <div style={{ display: "flex", flexDirection: "column", minWidth: 0, overflow: "auto" }}>
        <Topbar title={meta.title} subtitle={meta.sub} theme="light" setTheme={() => {}}/>
        <div style={{ flex: 1, minHeight: 0 }}>
          {cur === "home"     && <HomePage    openDetail={setDetail}/>}
          {cur === "queue"    && <QueuePage   openDetail={setDetail}/>}
          {cur === "archive"  && <ArchivePage openDetail={setDetail}/>}
          {cur === "dropped"  && <DroppedPage/>}
          {cur === "persona"  && <PersonaPage/>}
          {cur === "settings" && <SettingsPage/>}
        </div>
      </div>
      {detail && <DetailOverlay itemId={detail} onClose={() => setDetail(null)}/>}
    </div>
  );
}

// ---------- Tweaks panel ----------
function TweaksPanel({ open, state, update, close }) {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", right: 20, bottom: 20, zIndex: 1000,
      width: 280, padding: 16, borderRadius: 12,
      background: "var(--bg-raised)", border: "1px solid var(--border)",
      boxShadow: "var(--shadow-lg)" }}>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 12 }}>
        <strong style={{ fontSize: 13 }}>Tweaks</strong>
        <button onClick={close} style={{ marginLeft: "auto", width: 24, height: 24, borderRadius: 4, color: "var(--fg-2)" }} className="nr-hover">
          <Icon name="x" size={14}/>
        </button>
      </div>
      <Tweak label="呈現模式" value={state.mode} options={[
        ["canvas", "Design Canvas (六張 artboard)"],
        ["proto",  "Prototype (全螢幕可點)"],
      ]} onChange={(v) => update({ mode: v })}/>
      <Tweak label="主題" value={state.theme} options={[
        ["light", "淺色"],
        ["dark",  "深色"],
      ]} onChange={(v) => update({ theme: v })}/>
      <Tweak label="Prototype 起始頁" value={state.default_page} options={[
        ["home","首頁"],["queue","佇列"],["archive","歷史"],
        ["dropped","被擋掉"],["persona","Persona"],["settings","設定"],
      ]} onChange={(v) => update({ default_page: v })}/>
    </div>
  );
}
function Tweak({ label, value, options, onChange }) {
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 11, color: "var(--fg-2)", marginBottom: 5, fontWeight: 500 }}>{label}</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
        {options.map(([k, l]) => (
          <button key={k} onClick={() => onChange(k)}
            style={{ padding: "5px 9px", fontSize: 11, borderRadius: 5,
              border: `1px solid ${value === k ? "var(--fg)" : "var(--border)"}`,
              background: value === k ? "var(--fg)" : "var(--bg-raised)",
              color: value === k ? "var(--bg)" : "var(--fg-1)" }}>{l}</button>
        ))}
      </div>
    </div>
  );
}

// ---------- Root ----------
function Root() {
  const [state, setState] = useState(cfg);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", state.theme);
    document.body.setAttribute("data-theme", state.theme);
    document.body.setAttribute("data-mode", state.mode);
    localStorage.setItem("nr_tweaks", JSON.stringify(state));
  }, [state]);

  // Edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode")   setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const update = (patch) => {
    setState(s => {
      const next = { ...s, ...patch };
      try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*"); } catch {}
      return next;
    });
  };

  return (
    <div data-theme={state.theme} style={{ height: "100%" }}>
      {state.mode === "canvas"
        ? <Canvas/>
        : <DashApp initialPage={state.default_page} theme={state.theme}/>}
      <TweaksPanel open={tweaksOpen} state={state} update={update} close={() => setTweaksOpen(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>

</body>
</html>
